<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Control Panel - MSI Player 5.12</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            overflow: hidden;
            color: white;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: 80px 1fr 60px;
            gap: 0;
        }
        .header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 20px;
        }
        .status {
            margin-left: auto;
            padding: 8px 20px;
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            border-radius: 25px;
            font-size: 14px;
        }
        .main-content {
            padding: 30px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .card h3 {
            margin-bottom: 20px;
            font-size: 20px;
            color: #ffd93d;
        }
        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.2);
            outline: none;
            -webkit-appearance: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
        }
        .control-group {
            margin-bottom: 25px;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .toggle {
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.2);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        .toggle.active {
            background: #2ecc71;
        }
        .toggle::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }
        .toggle.active::after {
            left: 26px;
        }
        .footer {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .version {
            font-size: 14px;
            opacity: 0.8;
        }
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔥 FF Panel v5.12</div>
            <div class="status">MSI Player 5.12 • Connected</div>
        </div>
        
        <div class="main-content">
            <div class="card">
                <h3>🎮 Game Controls</h3>
                <div class="control-group">
                    <label>Aim Assist</label>
                    <input type="range" class="slider" min="0" max="100" value="75">
                </div>
                <div class="control-group">
                    <label>Recoil Control</label>
                    <input type="range" class="slider" min="0" max="100" value="85">
                </div>
                <div class="control-group">
                    <label>Auto Headshot</label>
                    <div class="toggle active" onclick="toggle(this)"></div>
                </div>
            </div>
            
            <div class="card">
                <h3>⚡ Performance</h3>
                <div class="control-group">
                    <label>FPS Boost</label>
                    <input type="range" class="slider" min="0" max="100" value="90">
                </div>
                <div class="control-group">
                    <label>Graphics Quality</label>
                    <select style="width:100%; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.1); color:white;">
                        <option>Ultra</option>
                        <option>High</option>
                        <option>Medium</option>
                        <option>Low</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Anti-Ban</label>
                    <div class="toggle active" onclick="toggle(this)"></div>
                </div>
            </div>
            
            <div class="card" style="grid-column: span 2;">
                <h3>📊 Status Monitor</h3>
                <div style="display:flex; gap:20px; flex-wrap:wrap;">
                    <div style="flex:1; text-align:center;">
                        <div style="font-size:32px; font-weight:bold; color:#2ecc71;">120</div>
                        <div>FPS</div>
                    </div>
                    <div style="flex:1; text-align:center;">
                        <div style="font-size:32px; font-weight:bold; color:#3498db;">98%</div>
                        <div>CPU</div>
                    </div>
                    <div style="flex:1; text-align:center;">
                        <div style="font-size:32px; font-weight:bold; color:#f39c12;">85%</div>
                        <div>GPU</div>
                    </div>
                    <div style="flex:1; text-align:center;">
                        <div style="font-size:32px; font-weight:bold; color:#e74c3c;">2.1GB</div>
                        <div>RAM</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <div class="version">Free Fire Control Panel • MSI Player 5.12 Compatible • 2026</div>
        </div>
    </div>

    <script>
        function toggle(element) {
            element.classList.toggle('active');
        }

        // Auto-update FPS counter
        setInterval(() => {
            const fps = document.querySelector('[style*="FPS"]');
            if (fps) {
                const current = parseInt(fps.textContent);
                fps.textContent = (current + (Math.random() > 0.5 ? 1 : -1)).toString();
            }
        }, 1000);
    </script>
</body>
</html>
